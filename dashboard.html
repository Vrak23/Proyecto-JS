<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - SENATI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/style-dashboard.css">
</head>
<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h4>SENATI</h4>
    <hr>
    <nav class="nav flex-column">
        <ul class="sidebar-nav">
            <li class="nav-item active">
                <a href="dashboard.html"><i class="fas fa-table-cells-large me-2"></i>Dashboard</a>
            </li>
            <li class="nav-item">
                <a href="alumno.html"><i class="fas fa-user-graduate me-2"></i>Estudiantes</a>
            </li>
            <li class="nav-item">
                <a href="aula.html"><i class="fas fa-school me-2"></i>Aulas</a>
            </li>
            <li class="nav-item">
                <a href="cursos.html"><i class="fas fa-book me-2"></i>Cursos</a>
            </li>
            <li class="nav-item">
                <a href="matriculas.html"><i class="fas fa-file-signature me-2"></i>Matriculas</a>
            </li>
            <li class="nav-item">
                <a href="pagos.html"><i class="fas fa-credit-card me-2"></i>Pagos</a>
            </li>
            <li class="nav-item">
                <a href="configuracion.html"><i class="fas fa-cog me-2"></i>Configuracion</a>
            </li>
        </ul>
    </nav>
    <div class="sidebar-footer">
        <button class="btn-logout" onclick="cerrarSesion()">
            <i class="fas fa-sign-out-alt"></i> Cerrar sesión
        </button>
    </div>
</div>

<!-- CONTENIDO PRINCIPAL -->
<div class="main-content">
    <div class="container-fluid px-0">

        <div class="d-flex justify-content-between align-items-start mb-4">
            <div>
                <h2 style="font-size:18px;font-weight:500;color:#1a1f2e;margin:0 0 2px;">Dashboard</h2>
                <p style="font-size:12px;color:#9ca3af;margin:0;">Resumen general del sistema</p>
            </div>
        </div>

        <!-- KPIs -->
        <div class="kpi-grid">
            <div class="kpi-card">
                <div class="kpi-icon" style="background:#eff6ff;">
                    <i class="fas fa-users" style="color:#3b82f6;"></i>
                </div>
                <div class="kpi-info">
                    <label>Total alumnos</label>
                    <h2 id="kpiTotalAlumnos">0</h2>
                </div>
            </div>
            <div class="kpi-card">
                <div class="kpi-icon" style="background:#f0fdf4;">
                    <i class="fas fa-school" style="color:#22c55e;"></i>
                </div>
                <div class="kpi-info">
                    <label>Aulas activas</label>
                    <h2 id="kpiTotalAulas">0</h2>
                </div>
            </div>
            <div class="kpi-card">
                <div class="kpi-icon" style="background:#fff7ed;">
                    <i class="fas fa-ticket" style="color:#f97316;"></i>
                </div>
                <div class="kpi-info">
                    <label>Vacantes disp.</label>
                    <h2 id="kpiVacantesDisp">0</h2>
                </div>
            </div>
        </div>

        <!-- Gráficos -->
        <div class="charts-grid">
            <div class="card chart-card">
                <div class="card-header"><h2>Alumnos por género</h2></div>
                <div class="card-body"><canvas id="graficoGenero"></canvas></div>
            </div>
            <div class="card chart-card">
                <div class="card-header"><h2>Vacantes por nivel educativo</h2></div>
                <div class="card-body"><canvas id="graficoNiveles"></canvas></div>
            </div>
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="js/auth.js"></script>
<script src="js/dashboard.js"></script>

<script>
    verificarLogin();
</script>

</body>
</html>
