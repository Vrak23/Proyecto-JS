<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Matrícula</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/style-dashboard.css">
</head>
<body>

<div class="sidebar">
    <h4 class="text-center mb-4">SENATI</h4>
    <hr>
    <nav class="nav flex-column">
        <a class="nav-link text-white" href="dashboard.html">Alumnos</a>
        <a class="nav-link text-white" href="aula.html">Aula</a>
        <a class="nav-link text-white" href="cursos.html">Cursos</a>

        <div class="mt-5">
            <button class="btn btn-danger w-100" onclick="cerrarSesion()">
                Cerrar sesión
            </button>
        </div>
    </nav>
</div>

    <div class="main-content">
        <div class="container-fluid">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2>Mantenimiento de Alumnos</h2>

                <button class="btn btn-primary"
                        data-bs-toggle="modal"
                        data-bs-target="#modalAlumno"
                        onclick="limpiarForm()">
                    Nuevo Registro
                </button>
            </div>

            <div class="table-container shadow-sm">
                <table class="table table-hover align-middle">
                    <thead class="table-dark">
                        <tr>
                            <th>ID</th>
                            <th>Nombres</th>
                            <th>Apellidos</th>
                            <th>F. Nacimiento</th>
                            <th>Celular</th>
                            <th>Correo</th>
                            <th>Estado</th>
                            <th class="text-center">Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="lista_alumnos"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- MODAL -->
    <div class="modal fade" id="modalAlumno" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">

                <div class="modal-header">
                    <h5 class="modal-title">Nuevo Alumno</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">
                    <form id="formAlumno">

                        <input type="hidden" id="id_alumno" name="id_alumno">
                    
                        <div class="row g-3">
                    
                            <div class="col-md-4">
                                <label for="dni">DNI</label>
                                <input type="text" id="dni" name="dni_alumno" class="form-control" required>
                            </div>
                    
                            <div class="col-md-4">
                                <label for="nombres">Nombres</label>
                                <input type="text" id="nombres" name="nombres" class="form-control" required>
                            </div>
                    
                            <div class="col-md-4">
                                <label for="apellidos">Apellidos</label>
                                <input type="text" id="apellidos" name="apellidos" class="form-control" required>
                            </div>

                            <!-- 🔥 NUEVO CAMPO -->
                            <div class="col-md-4">
                                <label for="fecha_nacimiento">Fecha Nacimiento</label>
                                <input type="date" id="fecha_nacimiento" name="fecha_nacimiento" class="form-control" required>
                            </div>
                    
                            <div class="col-md-3">
                                <label for="edad">Edad</label>
                                <input type="number" id="edad" name="edad" class="form-control" required>
                            </div>
                    
                            <div class="col-md-3">
                                <label for="genero">Género</label>
                                <select id="genero" name="genero" class="form-control" required>
                                    <option value="M">Masculino</option>
                                    <option value="F">Femenino</option>
                                </select>
                            </div>
                    
                            <div class="col-md-6">
                                <label for="direccion">Dirección</label>
                                <input type="text" id="direccion" name="direccion" class="form-control" required>
                            </div>
                    
                            <div class="col-md-6">
                                <label for="correo">Correo</label>
                                <input type="email" id="correo" name="correo" class="form-control" required>
                            </div>
                    
                            <div class="col-md-6">
                                <label for="celular">Celular</label>
                                <input type="text" id="celular" name="celular" class="form-control" required>
                            </div>
                    
                            <div class="col-md-6">
                                <label for="nombre_apoderado">Nombre Apoderado</label>
                                <input type="text" id="nombre_apoderado" name="nombre_apoderado" class="form-control" required>
                            </div>
                    
                            <div class="col-md-6">
                                <label for="celular_apoderado">Celular Apoderado</label>
                                <input type="text" id="celular_apoderado" name="celular_apoderado" class="form-control" required>
                            </div>
                    
                            <div class="col-md-4">
                                <label for="estado">Estado</label>
                                <select id="estado" name="estado" class="form-control">
                                    <option value="ACTIVO">ACTIVO</option>
                                    <option value="INACTIVO">INACTIVO</option>
                                </select>
                            </div>
                    
                        </div>
                    
                        <div class="alert alert-info mt-3">
                            El usuario y contraseña se generan automáticamente con el DNI.
                        </div>
                    
                        <div class="modal-footer mt-4">
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                            <button type="submit" class="btn btn-success">Guardar</button>
                        </div>
                    
                    </form>
                </div>

            </div>
        </div>
    </div>

    <!-- SCRIPTS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/dashboard.js"></script>

    <script>
        if (sessionStorage.getItem("logueado") !== "true") {
            window.location.href = "login.html";
        }

        function cerrarSesion() {
            sessionStorage.removeItem("logueado");
            window.location.href = "login.html";
        }
    </script>

</body>
</html>
