<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matriculas - SENATI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/style-dashboard.css">
</head>
<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h4>SENATI</h4>
    <hr>
    <nav class="nav flex-column">
        <ul class="sidebar-nav">
            <li class="nav-item">
                <a href="dashboard.html"><i class="fas fa-table-cells-large me-2"></i>Dashboard</a>
            </li>
            <li class="nav-item">
                <a href="alumno.html"><i class="fas fa-user-graduate me-2"></i>Estudiantes</a>
            </li>
            <li class="nav-item">
                <a href="aula.html"><i class="fas fa-school me-2"></i>Aulas</a>
            </li>
            <li class="nav-item">
                <a href="cursos.html"><i class="fas fa-book me-2"></i>Cursos</a>
            </li>
            <li class="nav-item active">
                <a href="matriculas.html"><i class="fas fa-file-signature me-2"></i>Matriculas</a>
            </li>
            <li class="nav-item">
                <a href="pagos.html"><i class="fas fa-credit-card me-2"></i>Pagos</a>
            </li>
            <li class="nav-item">
                <a href="configuracion.html"><i class="fas fa-cog me-2"></i>Configuracion</a>
            </li>
        </ul>
    </nav>
    <div class="sidebar-footer">
        <button class="btn-logout" onclick="cerrarSesion()">
            <i class="fas fa-sign-out-alt"></i> Cerrar sesion
        </button>
    </div>
</div>

<!-- CONTENIDO PRINCIPAL -->
<div class="main-content">
    <div class="container-fluid px-0">

        <div class="d-flex justify-content-between align-items-start mb-4">
            <div>
                <h2 style="font-size:18px;font-weight:500;color:#1a1f2e;margin:0 0 2px;">Matriculas</h2>
                <p style="font-size:12px;color:#9ca3af;margin:0;">Registro y control de matriculas</p>
            </div>
            <button class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#modalMatricula">
                <i class="fas fa-plus me-1"></i> Nueva Matricula
            </button>
        </div>

        <div class="kpi-grid">
            <div class="kpi-card">
                <div class="kpi-icon" style="background:#eff6ff;">
                    <i class="fas fa-file-signature" style="color:#3b82f6;"></i>
                </div>
                <div class="kpi-info">
                    <label>Total matriculas</label>
                    <h2 id="kpiTotalMatriculas">0</h2>
                </div>
            </div>
            <div class="kpi-card">
                <div class="kpi-icon" style="background:#f0fdf4;">
                    <i class="fas fa-circle-check" style="color:#22c55e;"></i>
                </div>
                <div class="kpi-info">
                    <label>Activas</label>
                    <h2 id="kpiActivas">0</h2>
                </div>
            </div>
            <div class="kpi-card">
                <div class="kpi-icon" style="background:#fff7ed;">
                    <i class="fas fa-clock" style="color:#f97316;"></i>
                </div>
                <div class="kpi-info">
                    <label>Pendientes</label>
                    <h2 id="kpiPendientes">0</h2>
                </div>
            </div>
        </div>

        <div class="table-container mb-4">
            <div class="p-3 border-bottom">
                <div class="row g-3">
                    <div class="col-md-4">
                        <label class="form-label mb-1" style="font-size:12px;color:#6b7280;">Buscar</label>
                        <input type="text" id="buscarMatricula" class="form-control" placeholder="Alumno o codigo">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label mb-1" style="font-size:12px;color:#6b7280;">Estado</label>
                        <select id="filtroEstado" class="form-select">
                            <option value="">Todos</option>
                            <option value="Activa">Activa</option>
                            <option value="Pendiente">Pendiente</option>
                            <option value="Anulada">Anulada</option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label mb-1" style="font-size:12px;color:#6b7280;">Periodo</label>
                        <select id="filtroPeriodo" class="form-select">
                            <option value="">Todos</option>
                            <option>2026 - I</option>
                            <option>2025 - II</option>
                            <option>2025 - I</option>
                        </select>
                    </div>
                </div>
            </div>

            <table class="table table-hover align-middle mb-0">
                <thead>
                    <tr>
                        <th>Codigo</th>
                        <th>Estudiante</th>
                        <th>Aula</th>
                        <th>Curso</th>
                        <th>Fecha</th>
                        <th>Estado</th>
                        <th class="text-center">Acciones</th>
                    </tr>
                </thead>
                <tbody id="tabla_matriculas">
                    <tr>
                        <td colspan="7" class="text-center text-muted py-4">Cargando matriculas...</td>
                    </tr>
                </tbody>
            </table>
        </div>

    </div>
</div>

<!-- MODAL -->
<div class="modal fade" id="modalMatricula" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" style="font-size:15px;">Nueva Matricula</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="formMatricula">
                    <input type="hidden" id="id_matricula" name="id_matricula">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">Estudiante</label>
                            <select id="matricula_alumno" name="id_alumno" class="form-select" required>
                                <option value="">Seleccionar estudiante</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Aula</label>
                            <select id="matricula_aula" name="id_aula" class="form-select" required>
                                <option value="">Seleccionar aula</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Curso</label>
                            <select id="matricula_curso" name="id_curso" class="form-select" required>
                                <option value="">Seleccionar curso</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Fecha de matricula</label>
                            <input type="date" id="matricula_fecha" name="fecha_matricula" class="form-control" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Periodo</label>
                            <input type="text" id="matricula_periodo" name="periodo" class="form-control" placeholder="Ej: 2026 - I" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Estado</label>
                            <select id="matricula_estado" name="estado" class="form-select" required>
                                <option value="Activa">Activa</option>
                                <option value="Pendiente">Pendiente</option>
                                <option value="Anulada">Anulada</option>
                            </select>
                        </div>
                    </div>
                    <div class="modal-footer mt-3 px-0">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                        <button type="submit" class="btn btn-success">
                            <i class="fas fa-save me-1"></i> Guardar
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/auth.js"></script>
<script src="js/matriculas.js"></script>
<script>
    verificarLogin();
</script>

</body>
</html>
