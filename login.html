<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Matrícula</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/estilos.css">
</head>
<body>
    <article class="container">
        <form id="formLogin" class="formulario">
            <h2 class="title">Iniciar Sesión</h2>
            <input type="text" id="logUsuario" placeholder="N° DNI o Usuario" required>
            <input type="password" id="logPassword" placeholder="Contraseña asignada" required>
            <button type="submit">Ingresar</button>
            <p id="mensajeLogin" class="mensaje"></p>
        </form>

        <div class="formulario" style="margin-top: 15px;">
            <a href="ejercicio-1.html" style="text-decoration: none;">
                <button type="button" class="button" style="background-color: var(--colorSecundario);">
                    Volver al Registro
                </button>
            </a>
        </div>
    </article>
</body>
</html>
