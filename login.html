<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Matrícula</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles-login.css">
</head>

<body>
    <div class="login-wrapper d-flex align-items-center justify-content-center min-vh-100">
        <div class="login-card">
            <div class="text-center mb-4">
                <h1 class="h4 fw-semibold mb-1">SENATI</h1>
                <p class="text-muted mb-0">Acceso al panel de matrícula</p>
            </div>

            <form id="formLogin" class="formulario">
                <div class="mb-3">
                    <label class="form-label">Usuario o DNI</label>
                    <input type="text" id="logUsuario" class="form-control" placeholder="N° DNI o Usuario" required>
                </div>
                <div class="mb-4">
                    <label class="form-label">Contraseña</label>
                    <input type="password" id="logPassword" class="form-control" placeholder="Contraseña asignada" required>
                </div>

                <button type="submit" class="btn btn-primary w-100 mb-2">Ingresar</button>
                <p id="mensajeLogin" class="text-danger small mb-0"></p>
            </form>

            <div class="text-center mt-3">
                <a href="ejercicio-1.html" class="btn btn-outline-secondary btn-sm">Volver al Registro</a>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="js/login.js"></script>
</body>
</html>
