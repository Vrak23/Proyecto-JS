<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Cursos</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/style-dashboard.css">
</head>

<body>

<div class="sidebar">
    <h4 class="text-center mb-4">SENATI</h4>
    <hr>
    <nav class="nav flex-column">
        <a class="nav-link text-white" href="dashboard.html">Alumnos</a>
        <a class="nav-link text-white" href="aula.html">Aula</a>
        <a class="nav-link text-white active" href="cursos.html">Cursos</a>

        <div class="mt-5">
            <button class="btn btn-danger w-100" onclick="cerrarSesion()">Cerrar sesión</button>
        </div>
    </nav>
</div>

<div class="main-content">
<div class="container-fluid">

<div class="d-flex justify-content-between mb-4">
    <h2>Mantenimiento Cursos</h2>

    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#modalCurso">
        Nuevo
    </button>
</div>

<div class="table-container">
<table class="table">
<thead class="table-dark">
<tr>
<th>ID</th>
<th>Nombre</th>
<th>Descripción</th>
<th>Créditos</th>
<th>Acciones</th>
</tr>
</thead>

<tbody id="lista_cursos"></tbody>

</table>
</div>

</div>
</div>

<!-- MODAL -->
<div class="modal fade" id="modalCurso">
<div class="modal-dialog">
<div class="modal-content">

<div class="modal-header">
<h5>Curso</h5>
</div>

<div class="modal-body">

<form id="formCurso">

<input type="hidden" id="id_curso" name="id_curso">

<input type="text" name="nombre" class="form-control mb-2" placeholder="Nombre">
<input type="text" name="descripcion" class="form-control mb-2" placeholder="Descripción">
<input type="number" name="creditos" class="form-control mb-2" placeholder="Créditos">

<button class="btn btn-success w-100">Guardar</button>

</form>

</div>
</div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/cursos.js"></script>

<script>
function cerrarSesion() {
    sessionStorage.removeItem("logueado");
    window.location.href = "login.html";
}
</script>

</body>
</html>
