<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cursos - SENATI</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/style-dashboard.css">
</head>
<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h4>SENATI</h4>
    <hr>
    <nav class="nav flex-column">
        <ul class="sidebar-nav">
            <li class="nav-item">
                <a href="dashboard.html"><i class="fas fa-table-cells-large me-2"></i>Dashboard</a>
            </li>
            <li class="nav-item">
                <a href="alumno.html"><i class="fas fa-user-graduate me-2"></i>Estudiantes</a>
            </li>
            <li class="nav-item">
                <a href="aula.html"><i class="fas fa-school me-2"></i>Aulas</a>
            </li>
            <li class="nav-item active">
                <a href="cursos.html"><i class="fas fa-book me-2"></i>Cursos</a>
            </li>
            <li class="nav-item">
                <a href="matriculas.html"><i class="fas fa-file-signature me-2"></i>Matriculas</a>
            </li>
            <li class="nav-item">
                <a href="pagos.html"><i class="fas fa-credit-card me-2"></i>Pagos</a>
            </li>
            <li class="nav-item">
                <a href="configuracion.html"><i class="fas fa-cog me-2"></i>Configuracion</a>
            </li>
        </ul>
    </nav>
    <div class="sidebar-footer">
        <button class="btn-logout" onclick="cerrarSesion()">
            <i class="fas fa-sign-out-alt"></i> Cerrar sesión
        </button>
    </div>
</div>

<!-- CONTENIDO -->
<div class="main-content">
    <div class="container-fluid px-0">

        <div class="d-flex justify-content-between align-items-start mb-4">
            <div>
                <h2 style="font-size:18px;font-weight:500;color:#1a1f2e;margin:0 0 2px;">Cursos</h2>
                <p style="font-size:12px;color:#9ca3af;margin:0;">Mantenimiento de cursos</p>
            </div>
            <button class="btn btn-primary btn-sm"
                    data-bs-toggle="modal"
                    data-bs-target="#modalCurso"
                    onclick="limpiarFormCurso()">
                <i class="fas fa-plus me-1"></i> Nuevo Curso
            </button>
        </div>

        <!-- TABLA -->
        <div class="table-container">
            <table class="table table-hover align-middle">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nombre</th>
                        <th>Descripción</th>
                        <th>Créditos</th>
                        <th class="text-center">Acciones</th>
                    </tr>
                </thead>
                <tbody id="lista_cursos"></tbody>
            </table>
        </div>

    </div>
</div>

<!-- MODAL -->
<div class="modal fade" id="modalCurso" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">

            <div class="modal-header">
                <h5 class="modal-title" id="modalCursoLabel">Nuevo Curso</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body">
                <form id="formCurso">
                    <input type="hidden" id="id_curso" name="id_curso">

                    <div class="mb-3">
                        <label class="form-label">Nombre del Curso</label>
                        <input type="text" name="nombre" class="form-control" placeholder="Ej: Matemática" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Descripción</label>
                        <textarea name="descripcion" class="form-control" rows="3" placeholder="Descripción breve del curso..."></textarea>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Créditos</label>
                        <input type="number" name="creditos" class="form-control" placeholder="Ej: 4" min="1" max="10" required>
                    </div>

                    <div class="modal-footer px-0">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                        <button type="submit" class="btn btn-success">
                            <i class="fas fa-save me-1"></i> Guardar
                        </button>
                    </div>
                </form>
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/auth.js"></script>
<script src="js/cursos.js"></script>

<script>
    verificarLogin();
</script>

</body>
</html>
