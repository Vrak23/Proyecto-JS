<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Aula</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/style-dashboard.css">
</head>

<body>

<div class="sidebar">
    <h4 class="text-center mb-4">SENATI</h4>
    <hr>
    <nav class="nav flex-column">
        <a class="nav-link text-white" href="dashboard.html">Alumnos</a>
        <a class="nav-link text-white active" href="aula.html">Aula</a>
        <a class="nav-link text-white" href="cursos.html">Cursos</a>

        <div class="mt-5">
            <button class="btn btn-danger w-100" onclick="cerrarSesion()">Cerrar sesión</button>
        </div>
    </nav>
</div>

<div class="main-content">
<div class="container-fluid">

<div class="d-flex justify-content-between mb-4">
    <h2>Mantenimiento Aula</h2>

    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#modalAula">
        Nuevo
    </button>
</div>

<div class="table-container">
<table class="table">
<thead class="table-dark">
<tr>
<th>ID</th>
<th>Nivel</th>
<th>Grado</th>
<th>Sección</th>
<th>Vacantes</th>
<th>Disponibles</th>
<th>Acciones</th>
</tr>
</thead>

<tbody id="lista_aula"></tbody>

</table>
</div>

</div>
</div>

<!-- MODAL -->
<div class="modal fade" id="modalAula">
<div class="modal-dialog">
<div class="modal-content">

<div class="modal-header">
<h5>Aula</h5>
</div>

<div class="modal-body">

<form id="formAula">

<input type="hidden" id="id_aula" name="id_aula">

<input type="text" name="nivel" class="form-control mb-2" placeholder="Nivel">
<input type="number" name="grado" class="form-control mb-2" placeholder="Grado">
<input type="text" name="seccion" class="form-control mb-2" placeholder="Sección">
<input type="number" name="vacantes_totales" class="form-control mb-2" placeholder="Vacantes totales">
<input type="number" name="vacantes_disponibles" class="form-control mb-2" placeholder="Vacantes disponibles">

<button class="btn btn-success w-100">Guardar</button>

</form>

</div>
</div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/aula.js"></script>

</body>
</html>
