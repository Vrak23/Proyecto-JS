<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aulas - SENATI</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/style-dashboard.css">
</head>
<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h4 class="text-center mb-4">SENATI</h4>
    <hr>
    <nav class="nav flex-column sidebar-nav">
        <ul style="list-style:none; padding:0; margin:0;">
            <li class="nav-item" style="cursor:pointer; padding: 8px 12px; border-radius:6px;">
                <a class="nav-link text-white p-0" href="dashboard.html">
                    <i class="fas fa-tachometer-alt me-2"></i>Dashboard
                </a>
            </li>
            <li class="nav-item" style="cursor:pointer; padding: 8px 12px; border-radius:6px;">
                <a class="nav-link text-white p-0" href="alumno.html">
                    <i class="fas fa-user-graduate me-2"></i>Estudiantes
                </a>
            </li>
            <li class="nav-item active" style="cursor:pointer; padding: 8px 12px; border-radius:6px;">
                <a class="nav-link text-white p-0" href="aula.html">
                    <i class="fas fa-school me-2"></i>Aulas
                </a>
            </li>
            <li class="nav-item" style="cursor:pointer; padding: 8px 12px; border-radius:6px;">
                <a class="nav-link text-white p-0" href="cursos.html">
                    <i class="fas fa-book me-2"></i>Cursos
                </a>
            </li>
        </ul>

        <div class="mt-5 px-2">
            <button class="btn btn-danger w-100" onclick="cerrarSesion()">
                <i class="fas fa-sign-out-alt me-1"></i> Cerrar sesión
            </button>
        </div>
    </nav>
</div>

<!-- CONTENIDO -->
<div class="main-content">
    <div class="container-fluid">

        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2><i class="fas fa-school me-2 text-secondary"></i>Mantenimiento de Aulas</h2>
            <button class="btn btn-primary"
                    data-bs-toggle="modal"
                    data-bs-target="#modalAula"
                    onclick="limpiarFormAula()">
                <i class="fas fa-plus me-1"></i> Nueva Aula
            </button>
        </div>

        <!-- TABLA -->
        <div class="table-container shadow-sm">
            <table class="table table-hover align-middle">
                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Nivel</th>
                        <th>Grado</th>
                        <th>Sección</th>
                        <th>Vacantes Totales</th>
                        <th>Disponibles</th>
                        <th class="text-center">Acciones</th>
                    </tr>
                </thead>
                <tbody id="lista_aula"></tbody>
            </table>
        </div>

    </div>
</div>

<!-- MODAL -->
<div class="modal fade" id="modalAula" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">

            <div class="modal-header">
                <h5 class="modal-title" id="modalAulaLabel">Nueva Aula</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body">
                <form id="formAula">
                    <input type="hidden" id="id_aula" name="id_aula">

                    <div class="mb-3">
                        <label class="form-label">Nivel</label>
                        <select name="nivel" class="form-control">
                            <option value="">-- Seleccionar --</option>
                            <option value="Inicial">Inicial</option>
                            <option value="Primaria">Primaria</option>
                            <option value="Secundaria">Secundaria</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Grado</label>
                        <input type="number" name="grado" class="form-control" placeholder="Ej: 3" min="1" max="6" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Sección</label>
                        <input type="text" name="seccion" class="form-control" placeholder="Ej: A" maxlength="1" required>
                    </div>

                    <div class="row g-3">
                        <div class="col-6">
                            <label class="form-label">Vacantes Totales</label>
                            <input type="number" name="vacantes_totales" class="form-control" placeholder="Ej: 30" min="1" required>
                        </div>
                        <div class="col-6">
                            <label class="form-label">Vacantes Disponibles</label>
                            <input type="number" name="vacantes_disponibles" class="form-control" placeholder="Ej: 10" min="0" required>
                        </div>
                    </div>

                    <div class="modal-footer mt-3 px-0">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                        <button type="submit" class="btn btn-success">
                            <i class="fas fa-save me-1"></i> Guardar
                        </button>
                    </div>
                </form>
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/aula.js"></script>

<script>
    if (sessionStorage.getItem("logueado") !== "true") {
        window.location.href = "login.html";
    }
    function cerrarSesion() {
        sessionStorage.removeItem("logueado");
        window.location.href = "login.html";
    }
</script>

</body>
</html>
