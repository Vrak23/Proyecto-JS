<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Matrícula</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/estilos.css">
    <script src="https://kit.fontawesome.com/812c8ee19a.js" crossorigin="anonymous"></script>
    <link rel="shortcut icon" href="img/logotipo_matricula.png" type="image/x-icon">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>
<body>
    <article class="container">
        <form id="formRegistro" class="formulario">
            <h2 class="title">Registro de Nuevo Alumno</h2>
            <input type="text" id="regNombres" name="nombres" placeholder="Nombres" required>
            <input type="text" id="regApellidos" name="apellidos" placeholder="Apellidos" required>
            <input type="text" id="regDni" name="dni" placeholder="N° DNI (8 dígitos)" maxlength="8" required>
            <input type="email" id="regCorreo" name="correo" placeholder="Correo Electrónico" required>
            <input type="date" id="regNacimiento" name="nacimiento" required>
            
            <input type="text" id="apoNombres" name="apoNombres" placeholder="Nombres del Apoderado" required>
            <input type="text" id="apoCelular" name="apoCelular" placeholder="Celular del Apoderado" maxlength="9" required>
            
            <button type="submit">Registrarse</button>
            <p id="mensajeRegistro" class="mensaje"></p>
        </form>

        <div class="formulario" style="margin-top: 15px;">
            <a href="login.html" style="text-decoration: none;">
                <button type="button" class="button" style="background-color: var(--colorSecundario);">
                    Ya tengo cuenta / Iniciar Sesión
                </button>
            </a>
        </div>
    </article>

    <script src="js/app.js"></script>
    <script src="js/ejercicio-1.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
