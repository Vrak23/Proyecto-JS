<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Matrícula</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles-login.css">
    <script src="https://kit.fontawesome.com/812c8ee19a.js" crossorigin="anonymous"></script>
    <link rel="shortcut icon" href="img/logotipo_matricula.png" type="image/x-icon">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>
<body>
    <div class="login-wrapper d-flex align-items-center justify-content-center min-vh-100">
        <div class="login-card">
            <form id="formRegistro" class="formulario">
                <div class="text-center mb-4">
                    <h2 class="title">Registro de Nuevo Alumno</h2>
                </div>
                <input type="text" id="regNombres" name="nombres" class="form-control" placeholder="Nombres" required>
                <input type="text" id="regApellidos" name="apellidos" class="form-control" placeholder="Apellidos" required>
                <input type="text" id="regDni" name="dni" class="form-control" placeholder="N° DNI (8 dígitos)" maxlength="8" required>
                <input type="email" id="regCorreo" name="correo" class="form-control" placeholder="Correo Electrónico" required>
                <input type="date" id="regNacimiento" name="nacimiento" class="form-control" required>
                <input type="text" id="apoNombres" name="apoNombres" class="form-control" placeholder="Nombres del Apoderado" required>
                <input type="text" id="apoCelular" name="apoCelular" class="form-control" placeholder="Celular del Apoderado" maxlength="9" required>
                <button type="submit" class="btn btn-primary w-100 mt-3">Registrarse</button>
                <p id="mensajeRegistro" class="text-danger small mb-0 mt-2"></p>
            </form>

            <div class="text-center mt-4">
                <a href="login.html" class="btn btn-outline-secondary btn-sm">Ya tengo cuenta / Iniciar Sesión</a>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script src="js/ejercicio-1.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
